<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>◊ FallRecruitOnboard · sovereign UK recruitment candidate/client registration · RTW · DBS · GDPR · AWR</title>
<meta name="description" content="Sovereign candidate and client registration for UK recruitment agencies. Right to Work, DBS, GDPR consent, AWR status, IR35, terms of business. Single HTML, IDB primary, MIT.">
<meta name="prime" content="983">
<meta name="theme-color" content="#0b0a0f">
<link rel="manifest" href='data:application/manifest+json,{"name":"FallRecruitOnboard","short_name":"recruit-onboard","start_url":"./","display":"standalone","background_color":"%230b0a0f","theme_color":"%23b8974a","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect width=%27192%27 height=%27192%27 fill=%27%230b0a0f%27 rx=%2728%27/><text x=%2796%27 y=%27140%27 font-family=%27Georgia, serif%27 font-size=%27122%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27%23b8974a%27>%E2%97%8A</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:13px}input:focus,textarea:focus,select:focus{border-color:var(--brass)}a{color:var(--brass)}
.app{min-height:100dvh;display:grid;grid-template-rows:48px 1fr}header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}.brand .mark{width:28px;height:28px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--void)}.brand .name{font-family:var(--serif);font-weight:600;font-size:14px}.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}nav.tabs button{padding:0 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent}nav.tabs button:hover{background:var(--ink);color:var(--cream)}nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--brass)}
.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
main{padding:18px 22px 60px;overflow-y:auto;max-width:900px;margin:0 auto;width:100%}
.disclaimer{background:rgba(139,26,26,0.15);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px}.disclaimer strong{color:var(--brass)}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600}.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}.section-h .actions{display:flex;gap:6px}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px;margin-bottom:14px}.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}.field input,.field select,.field textarea{width:100%}.field .hint{font-size:10px;color:var(--cream-muted);margin-top:3px;font-family:var(--mono)}
.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}.btn:hover{border-color:var(--amber);color:var(--amber)}.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}.btn.brass:hover{background:var(--amber)}.btn.sm{padding:4px 9px;font-size:11px}.btn.ghost{border-color:var(--line);color:var(--cream-dim)}.btn.danger:hover{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:top}th{color:var(--brass);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
.pill{display:inline-block;padding:2px 7px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--brass);color:var(--brass)}.pill.green{border-color:var(--green);color:var(--green)}.pill.red{border-color:var(--red);color:var(--red)}.pill.amber{border-color:var(--amber);color:var(--amber)}.pill.blue{border-color:var(--blue);color:var(--blue)}
.empty{padding:24px;text-align:center;color:var(--cream-muted);font-style:italic;font-size:12px}
.wizard-progress{display:flex;gap:4px;margin-bottom:18px}.wizard-progress .step{flex:1;height:4px;border-radius:2px;background:var(--line)}.wizard-progress .step.done{background:var(--green)}.wizard-progress .step.active{background:var(--brass)}
.step-card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:20px 22px;margin-bottom:14px}.step-card h3{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:4px}.step-card .step-sub{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px}
.consent-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);font-size:13px}.consent-row input[type="checkbox"]{margin-top:3px;flex-shrink:0}.consent-row .label{font-weight:600}.consent-row .desc{font-size:11px;color:var(--cream-dim);margin-top:2px}
.nav-btns{display:flex;justify-content:space-between;margin-top:16px}
.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}.msg{padding:10px 14px;border-radius:6px;max-width:88%;font-size:13px;line-height:1.55;white-space:pre-wrap}.msg.user{background:var(--ink);align-self:flex-end}.msg.bot{background:var(--void-2);border:1px solid var(--line);border-left:2px solid var(--brass);align-self:flex-start}.msg .src{font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}.chat-input{display:flex;gap:8px;margin-top:10px}.chat-input input{flex:1;padding:11px 14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}.modal-bg.open{display:flex}.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:4px;padding:22px;max-width:700px;width:100%;max-height:90vh;overflow:auto}.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){nav.tabs button{padding:0 10px;font-size:11px}main{padding:14px 14px 50px}.row{grid-template-columns:1fr}.row3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="brand"><div class="mark">◊</div><div><div class="name">FallRecruitOnboard</div></div><div class="seal">v1 · prime 983</div></div>
  <nav class="tabs" id="tabNav"></nav>
  <div class="tools-r"><button class="tool-btn" id="tierBadge" onclick="openModal('settings')">T0</button><button class="tool-btn" onclick="openModal('settings')">⚙</button></div>
</header>
<main id="view"></main>
</div>
<div class="modal-bg" id="modal"><div class="modal"><h2 id="modalTitle">.</h2><div id="modalBody"></div></div></div>
<div class="toast" id="toast">.</div>

<script>
'use strict';
const TOOLNAME='fallrecruitonboard',VERSION='1.0.0',PRIME=983,STORE='fallrecruitonboard-v1';
const TABS=[{id:'register',label:'new registration'},{id:'candidates',label:'candidates'},{id:'clients',label:'clients'},{id:'qa',label:'Q&A'}];

function newCandidateRec(){return{id:'',title:'',firstName:'',lastName:'',email:'',phone:'',address:'',dob:'',niNumber:'',sector:'',skills:'',experience:'',
  rtw:{verified:false,docType:'',docRef:'',verifyDate:'',expiryDate:''},
  dbs:{required:false,level:'',certNo:'',issueDate:'',updateService:false},
  gdpr:{privacyNotice:false,consentMarketing:false,consentClientShare:false,consentReferences:false,dataRetention:false,retentionPeriod:'12'},
  bankDetails:{sortCode:'',accountNo:'',accountName:''},
  emergency:{name:'',phone:'',relationship:''},
  health:{disabilities:'',adjustments:''},
  equalOps:{gender:'',ethnicity:'',disability:''},
  status:'new',ts:0}}

function newClientRec(){return{id:'',company:'',contact:'',contactTitle:'',email:'',phone:'',address:'',companyNo:'',sector:'',
  ir35:{companySize:'',sdsProcess:''},
  terms:{type:'standard',feePercent:'',rebatePeriod:'',paymentDays:'30',exclusivity:false},
  gdpr:{dpContact:'',privacyAgreed:false},
  insurance:{piCover:false,plCover:false,elCover:false},
  status:'new',ts:0}}

let state={active:'register',firm:null,candidates:[],clients:[],audit:[],
  ui:{wizardType:'candidate',wizardStep:0,wizardData:null,chat:[]},
  settings:{anthropicKey:'',auditChain:true}};

const $=(s,p=document)=>p.querySelector(s);const uid=p=>(p||'')+'_'+Math.random().toString(36).slice(2,11);const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dateStr=ts=>{if(!ts)return '—';return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;['state','audit','firms','candidates','clients'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'})})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
function idbGetAll(s){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(s,k){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(s,v,k){return new Promise(res=>{const tx=db.transaction(s,'readwrite');const o=tx.objectStore(s);const q=k!=null?o.put(v,k):o.put(v);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}
async function loadAll(){if(!db)await openDB();const[firms,cands,cls,auditArr,uiState]=await Promise.all([idbGetAll('firms'),idbGetAll('candidates'),idbGetAll('clients'),idbGetAll('audit'),idbGet('state','ui')]);state.firm=firms[0]||null;state.candidates=cands;state.clients=cls;state.audit=auditArr.sort((a,b)=>a.i-b.i);if(uiState){state.ui=Object.assign({},state.ui,uiState.value||{});state.settings=Object.assign({},state.settings,uiState.settings||{})}}
async function persistUI(){await idbPut('state',{value:{...state.ui},settings:state.settings},'ui')}
async function auditLog(action,opts={}){if(!state.settings.auditChain)return;const prev=state.audit.length?state.audit[state.audit.length-1]:null;const i=(prev?prev.i:0)+1;const entry={id:uid('au'),i,ts:now(),tool:TOOLNAME,action,reasoning:opts.reasoning||'',configVersion:TOOLNAME+'@'+VERSION,prevHash:prev?.docHash||'',docHash:'',payload:opts.payload||{}};entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,prevHash:entry.prevHash,payload:entry.payload}));state.audit.push(entry);await idbPut('audit',entry)}

let bcRecruit,bcSignal;
function initMesh(){try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()})}catch(e){}try{bcRecruit=new BroadcastChannel('fall-recruit');bcRecruit.addEventListener('message',e=>{const m=e.data;if(!m||m.source===TOOLNAME)return;if(m.type==='sync.request'){bcRecruit.postMessage({v:1,type:'sync.snapshot',ts:now(),source:TOOLNAME,payload:{candidates:state.candidates,clients:state.clients,firm:state.firm}})}});bcRecruit.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME})}catch(e){}}

const CAND_STEPS=[
  {id:'personal',name:'Personal Details',sub:'Name, contact, NI number'},
  {id:'experience',name:'Experience & Skills',sub:'Sector, skills, work history'},
  {id:'rtw',name:'Right to Work',sub:'Immigration Act 2006 · document verification'},
  {id:'dbs',name:'DBS Check',sub:'Disclosure and Barring Service · regulated activity'},
  {id:'gdpr',name:'GDPR & Data Protection',sub:'UK GDPR · consent · data retention'},
  {id:'emergency',name:'Emergency & Health',sub:'Emergency contact, adjustments, equal opportunities'},
];
const CLIENT_STEPS=[
  {id:'company',name:'Company Details',sub:'Company name, registration, contact'},
  {id:'ir35',name:'IR35 & Status',sub:'Company size, SDS process'},
  {id:'terms',name:'Terms of Business',sub:'Fee structure, payment, exclusivity'},
  {id:'compliance',name:'Compliance & GDPR',sub:'Insurance, data protection contact'},
];

function render(){$('#tabNav').innerHTML=TABS.map(t=>`<button class="${state.active===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');const v=$('#view');switch(state.active){case 'register':return renderRegister(v);case 'candidates':return renderCandidates(v);case 'clients':return renderClients(v);case 'qa':return renderQA(v)}}
function switchTab(id){state.active=id;persistUI();render()}

function renderRegister(v){
  const wt=state.ui.wizardType||'candidate';const step=state.ui.wizardStep||0;
  const steps=wt==='candidate'?CAND_STEPS:CLIENT_STEPS;
  if(!state.ui.wizardData)state.ui.wizardData=wt==='candidate'?newCandidateRec():newClientRec();
  const d=state.ui.wizardData;
  v.innerHTML=`<div class="disclaimer"><strong>◊ Regulatory notice:</strong> FallRecruitOnboard captures candidate and client registration data per Conduct of Employment Agencies Regulations 2003, Immigration Act 2006 (Right to Work), UK GDPR, and Equality Act 2010. All data stored locally. Data never leaves this device.</div><div class="section-h"><h2>New Registration</h2><div class="actions"><button class="btn sm ${wt==='candidate'?'brass':'ghost'}" onclick="setWizardType('candidate')">Candidate</button><button class="btn sm ${wt==='client'?'brass':'ghost'}" onclick="setWizardType('client')">Client</button></div></div><div class="wizard-progress">${steps.map((_,i)=>`<div class="step ${i<step?'done':i===step?'active':''}"></div>`).join('')}</div>`;
  const s=steps[step];
  v.innerHTML+=`<div class="step-card"><h3>${esc(s.name)}</h3><div class="step-sub">Step ${step+1} of ${steps.length} · ${esc(s.sub)}</div><div id="stepBody"></div><div class="nav-btns"><button class="btn ghost" ${step===0?'disabled':''} onclick="prevStep()">Back</button>${step<steps.length-1?`<button class="btn brass" onclick="nextStep()">Next</button>`:`<button class="btn brass" onclick="submitReg()">Submit</button>`}</div></div>`;
  renderStepBody(wt,s.id,d);
}
function setWizardType(t){state.ui.wizardType=t;state.ui.wizardStep=0;state.ui.wizardData=t==='candidate'?newCandidateRec():newClientRec();persistUI();render()}
function prevStep(){collectStep();state.ui.wizardStep=Math.max(0,state.ui.wizardStep-1);persistUI();render()}
function nextStep(){collectStep();const steps=state.ui.wizardType==='candidate'?CAND_STEPS:CLIENT_STEPS;state.ui.wizardStep=Math.min(steps.length-1,state.ui.wizardStep+1);persistUI();render()}

function renderStepBody(wt,stepId,d){const body=$('#stepBody');if(!body)return;
  if(wt==='candidate'){
    if(stepId==='personal')body.innerHTML=`<div class="row3"><div class="field"><label>Title</label><select id="wTitle"><option ${d.title==='Mr'?'selected':''}>Mr</option><option ${d.title==='Mrs'?'selected':''}>Mrs</option><option ${d.title==='Ms'?'selected':''}>Ms</option><option ${d.title==='Miss'?'selected':''}>Miss</option><option ${d.title==='Mx'?'selected':''}>Mx</option><option ${d.title==='Dr'?'selected':''}>Dr</option></select></div><div class="field"><label>First name</label><input id="wFirst" value="${esc(d.firstName)}"></div><div class="field"><label>Last name</label><input id="wLast" value="${esc(d.lastName)}"></div></div><div class="row"><div class="field"><label>Email</label><input id="wEmail" value="${esc(d.email)}"></div><div class="field"><label>Phone</label><input id="wPhone" value="${esc(d.phone)}"></div></div><div class="field"><label>Address</label><input id="wAddr" value="${esc(d.address)}"></div><div class="row"><div class="field"><label>Date of birth</label><input type="date" id="wDob" value="${esc(d.dob)}"></div><div class="field"><label>NI number</label><input id="wNi" value="${esc(d.niNumber)}" placeholder="AB123456C"><div class="hint">Required for payrolled temp workers</div></div></div>`;
    else if(stepId==='experience')body.innerHTML=`<div class="row"><div class="field"><label>Sector</label><select id="wSector"><option ${d.sector==='IT'?'selected':''}>IT</option><option ${d.sector==='Finance'?'selected':''}>Finance</option><option ${d.sector==='Engineering'?'selected':''}>Engineering</option><option ${d.sector==='Healthcare'?'selected':''}>Healthcare</option><option ${d.sector==='Legal'?'selected':''}>Legal</option><option ${d.sector==='Construction'?'selected':''}>Construction</option><option ${d.sector==='Education'?'selected':''}>Education</option><option ${d.sector==='Admin'?'selected':''}>Admin</option><option ${d.sector==='Other'?'selected':''}>Other</option></select></div><div class="field"><label>Skills</label><input id="wSkills" value="${esc(d.skills)}" placeholder="Comma-separated"></div></div><div class="field"><label>Experience summary</label><textarea id="wExp" rows="4">${esc(d.experience)}</textarea></div>`;
    else if(stepId==='rtw')body.innerHTML=`<div class="card" style="border-color:var(--ox);margin-bottom:12px"><p style="font-size:12px;color:var(--cream-dim);line-height:1.6"><strong style="color:var(--brass)">Immigration, Asylum and Nationality Act 2006:</strong> Verify Right to Work BEFORE engagement starts. Retain copies for duration + 2 years. Civil penalty up to £45,000 per illegal worker.</p></div><div class="row"><div class="field"><label>Document type</label><select id="wRtwDoc"><option value="" ${!d.rtw.docType?'selected':''}>— select —</option><option ${d.rtw.docType==='UK passport'?'selected':''}>UK passport</option><option ${d.rtw.docType==='Irish passport'?'selected':''}>Irish passport</option><option ${d.rtw.docType==='Share code (gov.uk)'?'selected':''}>Share code (gov.uk)</option><option ${d.rtw.docType==='BRP'?'selected':''}>BRP</option><option ${d.rtw.docType==='Visa'?'selected':''}>Visa</option><option ${d.rtw.docType==='Other'?'selected':''}>Other</option></select></div><div class="field"><label>Document ref / share code</label><input id="wRtwRef" value="${esc(d.rtw.docRef)}"></div></div><div class="row"><div class="field"><label>Verification date</label><input type="date" id="wRtwDate" value="${esc(d.rtw.verifyDate)}"></div><div class="field"><label>Expiry date (if applicable)</label><input type="date" id="wRtwExp" value="${esc(d.rtw.expiryDate)}"></div></div><div class="consent-row"><input type="checkbox" id="wRtwVerified" ${d.rtw.verified?'checked':''}><div><div class="label">I confirm I have seen and verified the original document(s)</div><div class="desc">Copies retained per Immigration Act 2006 requirements</div></div></div>`;

function collectStep(){const wt=state.ui.wizardType;const step=(wt==='candidate'?CAND_STEPS:CLIENT_STEPS)[state.ui.wizardStep];const d=state.ui.wizardData;if(!step||!d)return;
  if(wt==='candidate'){
    if(step.id==='personal'){d.title=$('#wTitle')?.value||d.title;d.firstName=$('#wFirst')?.value?.trim()||d.firstName;d.lastName=$('#wLast')?.value?.trim()||d.lastName;d.email=$('#wEmail')?.value?.trim()||d.email;d.phone=$('#wPhone')?.value?.trim()||d.phone;d.address=$('#wAddr')?.value?.trim()||d.address;d.dob=$('#wDob')?.value||d.dob;d.niNumber=$('#wNi')?.value?.trim()||d.niNumber}
    else if(step.id==='experience'){d.sector=$('#wSector')?.value||d.sector;d.skills=$('#wSkills')?.value?.trim()||d.skills;d.experience=$('#wExp')?.value?.trim()||d.experience}
    else if(step.id==='rtw'){d.rtw.docType=$('#wRtwDoc')?.value||d.rtw.docType;d.rtw.docRef=$('#wRtwRef')?.value?.trim()||d.rtw.docRef;d.rtw.verifyDate=$('#wRtwDate')?.value||d.rtw.verifyDate;d.rtw.expiryDate=$('#wRtwExp')?.value||d.rtw.expiryDate;d.rtw.verified=$('#wRtwVerified')?.checked||false}
    else if(step.id==='dbs'){d.dbs.required=$('#wDbsReq')?.checked||false;d.dbs.level=$('#wDbsLevel')?.value||d.dbs.level;d.dbs.certNo=$('#wDbsCert')?.value?.trim()||d.dbs.certNo;d.dbs.issueDate=$('#wDbsDate')?.value||d.dbs.issueDate;d.dbs.updateService=$('#wDbsUpdate')?.checked||false}
    else if(step.id==='gdpr'){d.gdpr.privacyNotice=$('#wGdprPrivacy')?.checked||false;d.gdpr.consentMarketing=$('#wGdprMarketing')?.checked||false;d.gdpr.consentClientShare=$('#wGdprClientShare')?.checked||false;d.gdpr.consentReferences=$('#wGdprRefs')?.checked||false;d.gdpr.dataRetention=$('#wGdprRetention')?.checked||false;d.gdpr.retentionPeriod=$('#wGdprPeriod')?.value||d.gdpr.retentionPeriod}
    else if(step.id==='emergency'){d.emergency.name=$('#wEmName')?.value?.trim()||d.emergency.name;d.emergency.phone=$('#wEmPhone')?.value?.trim()||d.emergency.phone;d.emergency.relationship=$('#wEmRel')?.value?.trim()||d.emergency.relationship;d.health.disabilities=$('#wDisability')?.value?.trim()||d.health.disabilities;d.health.adjustments=$('#wAdjust')?.value?.trim()||d.health.adjustments;d.equalOps.gender=$('#wGender')?.value||'';d.equalOps.ethnicity=$('#wEthnicity')?.value||'';d.equalOps.disability=$('#wDisStat')?.value||''}
  } else {
    if(step.id==='company'){d.company=$('#wComp')?.value?.trim()||d.company;d.companyNo=$('#wCoNo')?.value?.trim()||d.companyNo;d.contact=$('#wContact')?.value?.trim()||d.contact;d.contactTitle=$('#wConTitle')?.value?.trim()||d.contactTitle;d.email=$('#wEmail')?.value?.trim()||d.email;d.phone=$('#wPhone')?.value?.trim()||d.phone;d.address=$('#wAddr')?.value?.trim()||d.address;d.sector=$('#wSector')?.value||d.sector}
    else if(step.id==='ir35'){d.ir35.companySize=$('#wIr35Size')?.value||d.ir35.companySize;d.ir35.sdsProcess=$('#wIr35SDS')?.value||d.ir35.sdsProcess}
    else if(step.id==='terms'){d.terms.type=$('#wTermsType')?.value||d.terms.type;d.terms.feePercent=$('#wFeePct')?.value||d.terms.feePercent;d.terms.rebatePeriod=$('#wRebate')?.value||d.terms.rebatePeriod;d.terms.paymentDays=$('#wPayDays')?.value||d.terms.paymentDays;d.terms.exclusivity=$('#wExcl')?.checked||false}
    else if(step.id==='compliance'){d.insurance.piCover=$('#wPi')?.checked||false;d.insurance.plCover=$('#wPl')?.checked||false;d.insurance.elCover=$('#wEl')?.checked||false;d.gdpr.dpContact=$('#wDpContact')?.value?.trim()||d.gdpr.dpContact;d.gdpr.privacyAgreed=$('#wGdprAgreed')?.checked||false}

async function submitReg(){collectStep();const wt=state.ui.wizardType;const d=state.ui.wizardData;d.id=uid(wt==='candidate'?'cn':'cl');d.ts=now();d.status='complete';
  if(wt==='candidate'){state.candidates.push(d);await idbPut('candidates',d);try{bcRecruit?.postMessage({v:1,type:'sync.snapshot',ts:now(),source:TOOLNAME,payload:{candidates:[d]}})}catch(e){}}
  else{state.clients.push(d);await idbPut('clients',d);try{bcRecruit?.postMessage({v:1,type:'sync.snapshot',ts:now(),source:TOOLNAME,payload:{clients:[d]}})}catch(e){}}
  await auditLog(wt+'.registered',{payload:{id:d.id}});state.ui.wizardStep=0;state.ui.wizardData=null;persistUI();toast('Registered');render()}

const T0_QA=[
  {q:/rtw|right.?to.?work|immigration|passport|visa|share.?code/i,a:'Immigration, Asylum and Nationality Act 2006: verify Right to Work BEFORE engagement. Acceptable documents: UK/Irish passport, gov.uk share code (online check for non-UK nationals), BRP, valid visa. Manual checks: original documents in person. Online checks: share code on gov.uk. Keep copies for duration of employment + 2 years after end. Civil penalty: up to £45,000 per illegal worker (from 13 Feb 2024). Repeat offences: criminal prosecution. Agency is the "employer" for RTW purposes for temps.'},
  {q:/dbs|disclosure|barring|criminal|regulated/i,a:'Disclosure and Barring Service (DBS): Basic (unspent convictions), Standard (spent + unspent), Enhanced (+ police intelligence), Enhanced with barred lists (regulated activity). Agencies placing into regulated activity (healthcare, education, childcare, vulnerable adults) must obtain enhanced DBS. DBS Update Service: portable, check status online. Portability between agencies limited — risk assessment required. Rehabilitation of Offenders Act 1974: spent convictions protected except for excepted roles.'},
  {q:/gdpr|data|privacy|consent|retention|erasure/i,a:'UK GDPR / Data Protection Act 2018: lawful basis — consent (applications) or legitimate interest (proactive sourcing). Privacy notice before processing. Special category (health, ethnicity, disability) — explicit consent required. Retention: active candidates — duration + agreed period; unsuccessful — 6-12 months. Rights: access (1 month), rectification, erasure ("right to be forgotten"), portability. ICO registration mandatory. Data processing agreements with clients (Art.28).'},
  {q:/conduct|regulation|2003|terms|opt.?out/i,a:'Conduct of Employment Agencies Regulations 2003: written terms to work-seekers AND hirers before services begin. Key terms for work-seekers: nature of services, fees (none for finding work), notice period, complaints procedure. Opt-out (Reg 10): work-seeker can opt out of certain provisions, must be in writing, 7-day cooling-off period. Records retained 1 year after last provision. Suitability checks: Reg 22 — qualifications, experience, authorisation verified.'},
  {q:/ir35|off.?payroll|sds|status|inside|outside|small/i,a:'Off-payroll (IR35) from April 2021: medium/large private sector end-clients determine status. Small company exemption (Companies Act 2006 s.382): turnover ≤£10.2M, balance sheet ≤£5.1M, employees ≤50 — meet 2 of 3. Agency in the chain must: pass SDS to worker, deduct tax/NI if "inside", provide right of appeal. HMRC CEST tool recommended. Key factors: control, substitution, mutuality of obligation.'},
  {q:/equal|discrimination|protected|adjustment/i,a:'Equality Act 2010: 9 protected characteristics. Agencies must not discriminate when providing recruitment services. Cannot accept discriminatory job specifications from clients. Duty to make reasonable adjustments for disabled candidates. Equal opportunities monitoring: voluntary, anonymised. Positive action (s.159): can take proportionate action to address under-representation. Record-keeping recommended for compliance evidence.'},
  {q:/reference|suitability|check|qualif/i,a:'Conduct Regulations 2003 Reg 22: agency must take "reasonably practicable steps" to verify suitability — qualifications, experience, authorisation. References: not mandatory under Conduct Regs but best practice. Professional registrations: verify directly with governing body. For regulated sectors: additional checks (NMC, GMC, SRA, FCA). Keep evidence of all checks on file.'},
  {q:/temp|payroll|paye|holiday|bank/i,a:'Temp workers on agency payroll: operate PAYE, issue payslips, calculate holiday pay (5.6 weeks/year). Bank details collection: verify identity, protect data. NI number needed for RTI submission. Starter checklist for new employees. Auto-enrolment pension obligations if qualifying earnings. Payment: Conduct Regs — must pay temps for work done regardless of client payment.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK recruitment rules'}}return null}
async function askT3(q){if(!state.settings.anthropicKey)return null;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.settings.anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK recruitment compliance expert. Conduct Regs 2003, RTW, DBS, GDPR, AWR, IR35, Equality Act 2010. Concise.\n\n'+q}]})});if(!res.ok)return null;const j=await res.json();return {answer:j.content?.[0]?.text,source:'T3 · Anthropic'}}catch(e){return null}}
function renderQA(v){v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 + T3 BYOK</div></div><div class="card" style="max-width:780px"><div class="chat" id="chatBox">${(state.ui.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div><div class="chat-input"><input id="chatIn" placeholder="Ask… 'RTW check process?' · 'DBS levels?' · 'GDPR retention?'" onkeydown="if(event.key==='Enter')askQ()"><button class="btn brass" onclick="askQ()">Ask</button></div></div>`;const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight}
async function askQ(){const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';if(!state.ui.chat)state.ui.chat=[];state.ui.chat.push({role:'user',text:q});render();let r=askT0(q);if(!r)r=await askT3(q);state.ui.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match. Add BYOK key for T3.',source:'system'});persistUI();render()}

function openModal(type){const modal=$('#modal');$('#modalTitle').textContent='Settings';modal.classList.add('open');$('#modalBody').innerHTML=`<div class="field"><label>Anthropic key (T3)</label><input type="password" id="sKey" value="${esc(state.settings.anthropicKey||'')}"></div><div style="margin:10px 0"><label style="font-size:12px"><input type="checkbox" id="sAudit" ${state.settings.auditChain?'checked':''}> Audit chain</label></div><div class="actions"><button class="btn ghost sm" onclick="exportAll()">Export</button><button class="btn ghost sm" onclick="importAll()">Import</button><button class="btn danger sm" onclick="wipeAll()">Wipe</button><button class="btn brass" onclick="saveSettings()">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`}
function closeModal(){$('#modal').classList.remove('open')}
function saveSettings(){state.settings.anthropicKey=$('#sKey').value.trim();state.settings.auditChain=$('#sAudit').checked;$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';persistUI();closeModal();toast('Saved');render()}
function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),candidates:state.candidates,clients:state.clients};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallrecruitonboard-export.json';a.click();URL.revokeObjectURL(u);toast('Exported')}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());for(const k of['candidates','clients']){if(Array.isArray(d[k]))for(const r of d[k]){state[k].push(r);await idbPut(k,r)}}persistUI();toast('Imported');render()}catch(e){toast('Failed')}};inp.click()}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;for(const s of['firms','candidates','clients','audit','state']){const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r})}location.reload()}
